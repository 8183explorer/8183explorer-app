<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <rect width="100" height="100" fill="#F5F0EB" rx="12"/>

  <!-- Yellow quadrant (top-right quarter) -->
  <path d="M50,50 L50,15 A35,35 0 0,1 85,50 Z" fill="#FFCC00"/>

  <!-- Concentric inner circles (light gray) -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="#D0D0D0" stroke-width="1"/>
  <circle cx="50" cy="50" r="20" fill="none" stroke="#D0D0D0" stroke-width="1"/>
  <circle cx="50" cy="50" r="12" fill="none" stroke="#D0D0D0" stroke-width="1"/>

  <!-- Crosshair lines -->
  <line x1="15" y1="50" x2="85" y2="50" stroke="#C8C8C8" stroke-width="1.2"/>
  <line x1="50" y1="15" x2="50" y2="85" stroke="#C8C8C8" stroke-width="1.2"/>

  <!-- Outer ring (black, thick) -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="#1A1A1A" stroke-width="5"/>

  <!-- Center dot -->
  <circle cx="50" cy="50" r="4.5" fill="#1A1A1A"/>
  <circle cx="50" cy="50" r="2" fill="#F5F0EB"/>
</svg>